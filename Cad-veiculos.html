<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículos | Ferreira Costa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://e7.pngegg.com/pngimages/167/493/png-clipart-sports-car-vehicle-computer-icons-used-car-car-blue-van.png">
    
    <style>
        :root {
            --fc-blue: #003399;
            --fc-blue-dark: #002673;
            --fc-yellow: #FFD400;
            --fc-red: #ED1C24;
            --fc-green: #22c55e;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; overflow-x: hidden; }

        .input-required { border: 2px solid var(--fc-red) !important; outline: none; }
        .input-valid { border: 2px solid var(--fc-green) !important; outline: none; }

        .menu-icon {
            position: fixed; top: 15px; right: 15px; z-index: 1001;
            background: var(--fc-blue); color: white; border: none;
            width: 42px; height: 42px; border-radius: 10px; cursor: pointer; 
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow);
        }

        .sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--fc-blue); z-index: 1000; transition: 0.4s;
            padding: 80px 20px 20px; box-sizing: border-box;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .sidebar.active { right: 0; }
        .sidebar-item { padding: 12px 18px; color: white; cursor: pointer; font-weight: 600; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); color: var(--fc-yellow); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 999; }
        .overlay.active { display: block; }

        .header-brand { background: var(--fc-blue); padding: 30px 20px 80px; text-align: center; }
        .brand-name img { height: 38px; width: auto; display: block; margin: 0 auto; }
        .brand-name span { color: white; font-size:10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; display: block; margin-top: 8px; }

        .container { width: 94%; max-width: 900px; margin: -65px auto 30px; background: var(--card-bg); border-radius: 15px; box-shadow: var(--shadow); overflow: hidden; position: relative; }
        .view-section { display: none; padding: 20px; position: relative; }
        .view-section.active { display: block; }

        .btn-close { position: absolute; top: 15px; right: 15px; background: #f1f5f9; border: none; width: 30px; height: 30px; border-radius: 50%; color: var(--text-muted); font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }

        .search-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-bottom: 10px; }
        .search-field { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        
        .search-highlight { background: #fffbeb; border: 2px solid var(--fc-yellow); border-radius: 12px; margin-top: 10px; padding: 15px; display: none; }
        .search-highlight.active { display: block; }

        .placa-badge { background: white; color: #333; padding: 4px 10px; border: 2px solid #333; border-radius: 6px; font-weight: 800; font-size: 16px; position: relative; overflow: hidden; text-align: center; display: inline-block; }
        .placa-badge::before { content: "BRASIL"; display: block; font-size: 6px; background: #003399; color: white; margin: -4px -10px 4px -10px; padding: 1px 0; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #decba4; }
        .info-item { font-size: 12px; color: #475569; }
        .info-item strong { color: var(--fc-blue); font-size: 9px; text-transform: uppercase; display: block; }

        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .form-group.full { grid-column: span 3; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--fc-blue); margin-bottom: 3px; }
        .form-group input { width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.2s; }
        
        .btn-save { background: var(--fc-blue); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 14px; }
        .btn-add-more { background: #e2e8f0; color: var(--fc-blue); border: 2px dashed var(--fc-blue); padding: 10px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 12px; }

        .review-box { display: none; background: #f0f9ff; border: 2px solid var(--fc-blue); border-radius: 12px; padding: 20px; margin-top: 15px; animation: fadeIn 0.3s; }
        .review-box.active { display: block; }
        .review-title { color: var(--fc-blue); font-weight: 800; font-size: 14px; margin-bottom: 10px; border-bottom: 2px solid var(--fc-yellow); display: inline-block; }

        .veiculo-tag {
            background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 8px;
            border-left: 4px solid var(--fc-blue); display: flex; justify-content: space-between; align-items: center;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { text-align: center; padding: 15px; font-size: 11px; color: var(--text-muted); }

        @media (max-width: 700px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .form-group.full { grid-column: span 2; }
            .search-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<button class="menu-icon" onclick="toggleMenu()">☰</button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-item" onclick="switchView('consulta')">🔍 Consultar Veículos</div>
    <div class="sidebar-item" onclick="prepareAdd()">➕ Novo Cadastro</div>
</div>

<div class="header-brand">
    <h1 class="brand-name">
        <img src="https://d2urakutajlof6.cloudfront.net/logo/logo_fc.svg" alt="Ferreira Costa">
        <span>veículos</span>
    </h1>
</div>

<div class="container">
    <div id="view-consulta" class="view-section active">
        <h2 style="color: var(--fc-blue); font-weight: 800; margin: 0 0 5px; text-align: center; font-size: 18px;">Consulta de Veículos</h2>
        <div class="search-grid">
            <input type="text" id="search-placa" class="search-field" oninput="aplicarMascaraPlacaBusca(this)" placeholder="PLACA (ABC-1234)" maxlength="8">
            <input type="text" id="search-geral" class="search-field" oninput="filtrar()" placeholder="🔍 Nome, Matrícula ou Setor...">
        </div>
        <div id="search-results-area" class="search-highlight">
            <div id="corpoBusca"></div>
        </div>
    </div>

    <div id="view-cadastro" class="view-section">
        <button class="btn-close" onclick="switchView('consulta', true)">✕</button>
        <h2 id="form-title" style="color: var(--fc-blue); font-weight: 800; margin: 0 0 15px; font-size: 18px;">Dados do Veículo</h2>
        <input type="hidden" id="edit-index" value="-1">
        
        <div id="form-content">
            <div class="form-grid">
                <div class="form-group"><label>PLACA *</label><input type="text" id="v-placa" class="input-required" maxlength="8"></div>
                <div class="form-group"><label>MARCA *</label><input type="text" id="v-marca" class="input-required"></div>
                <div class="form-group"><label>MODELO *</label><input type="text" id="v-modelo" class="input-required"></div>
                <div class="form-group"><label>COR *</label><input type="text" id="v-cor" class="input-required"></div>
                
                <div class="form-group full">
                    <button class="btn-add-more" onclick="adicionarOutroVeiculo()">+ ADICIONAR OUTRO VEÍCULO PARA ESTA PESSOA</button>
                    <div id="lista-temporaria" style="margin-top:10px; font-size:11px; color:var(--fc-blue)"></div>
                </div>

                <div class="form-group"><label>MATRÍCULA *</label><input type="text" id="v-matricula" class="input-required"></div>
                <div class="form-group"><label>SETOR *</label><input type="text" id="v-setor" class="input-required"></div>
                <div class="form-group full"><label>NOME COMPLETO *</label><input type="text" id="v-nome" class="input-required"></div>
                <div class="form-group"><label>CARGO *</label><input type="text" id="v-cargo" class="input-required"></div>
                <div class="form-group"><label>CONTATO *</label><input type="text" id="v-contato" class="input-required" maxlength="17"></div>
                <div class="form-group"><label>RAMAL *</label><input type="text" id="v-ramal" class="input-required"></div>
            </div>
            <button class="btn-save" onclick="revisarDados()">CONFERIR DADOS</button>
        </div>

        <div id="view-revisao" class="review-box">
            <span class="review-title">REVISÃO DOS DADOS</span>
            <div id="revisao-lista" class="info-grid" style="margin-bottom: 20px; border-top: none;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-save" style="background: #94a3b8; margin:0;" onclick="voltarEdicao()">CORRIGIR</button>
                <button class="btn-save" style="background: var(--fc-green); margin:0;" onclick="salvarFinal()">CONFIRMAR E SALVAR TUDO</button>
            </div>
        </div>
    </div>
</div>

<footer>🛡️ Prevenção de perdas | Ferreira Costa</footer>

<script>
    let dadosVeiculos = JSON.parse(localStorage.getItem('veiculosFC')) || [];
    let veiculosTemp = [];
    const camposIds = ['v-placa', 'v-marca', 'v-modelo', 'v-cor', 'v-matricula', 'v-setor', 'v-nome', 'v-cargo', 'v-contato', 'v-ramal'];
    const SENHA_ADM = "APPADM";

    // --- UTILS ---
    const normalizar = (str) => {
        if (!str) return "";
        return str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toUpperCase();
    };

    // --- VALIDAÇÃO ---
    function validarInput(el) {
        if (el.value.trim().length >= 2) {
            el.classList.remove('input-required');
            el.classList.add('input-valid');
        } else {
            el.classList.remove('input-valid');
            el.classList.add('input-required');
        }
    }

    function initBordas() {
        camposIds.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.addEventListener('input', () => validarInput(el));
        });
    }

    // --- MÁSCARAS ---
    function aplicarMascaraPlacaBusca(el) {
        let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (v.length > 3) v = v.substring(0, 3) + '-' + v.substring(3, 7);
        el.value = v;
        filtrar();
    }

    function aplicarMascaraPlaca(el) {
        let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (v.length > 3) v = v.substring(0, 3) + '-' + v.substring(3, 7);
        el.value = v;
        validarInput(el);
    }

    function aplicarMascaraContato(el) {
        let v = el.value.replace(/\D/g, '');
        if (v.length > 11) v = v.substring(0, 11);
        if (v.length > 0) {
            if (v.length <= 2) v = '(' + v;
            else if (v.length <= 3) v = '(' + v.substring(0, 2) + ') ' + v.substring(2);
            else if (v.length <= 7) v = '(' + v.substring(0, 2) + ') ' + v.substring(2, 3) + ' ' + v.substring(3);
            else v = '(' + v.substring(0, 2) + ') ' + v.substring(2, 3) + ' ' + v.substring(3, 7) + '-' + v.substring(7);
        }
        el.value = v;
        validarInput(el);
    }

    document.getElementById('v-placa').addEventListener('input', (e) => aplicarMascaraPlaca(e.target));
    document.getElementById('v-contato').addEventListener('input', (e) => aplicarMascaraContato(e.target));

    // --- LÓGICA DE CADASTRO ---
    function adicionarOutroVeiculo() {
        const p = document.getElementById('v-placa').value.trim().toUpperCase();
        const m = document.getElementById('v-marca').value.trim().toUpperCase();
        const mod = document.getElementById('v-modelo').value.trim().toUpperCase();
        const c = document.getElementById('v-cor').value.trim().toUpperCase();

        if(!p || !m || !mod || !c) return alert("Preencha todos os dados do veículo atual primeiro!");

        veiculosTemp.push({ placa: p, marca: m, modelo: mod, cor: c });
        
        ['v-placa', 'v-marca', 'v-modelo', 'v-cor'].forEach(id => {
            const el = document.getElementById(id);
            el.value = "";
            el.classList.remove('input-valid');
            el.classList.add('input-required');
        });

        atualizarListaTemp();
    }

    function atualizarListaTemp() {
        const lista = document.getElementById('lista-temporaria');
        lista.innerHTML = veiculosTemp.map((v, i) => `
            <div style="background:#f1f5f9; padding:5px 10px; border-radius:5px; margin-bottom:5px; display:flex; justify-content:space-between">
                <span><strong>${v.placa}</strong> - ${v.modelo}</span>
                <span style="color:red; cursor:pointer" onclick="veiculosTemp.splice(${i},1); atualizarListaTemp()">remover</span>
            </div>
        `).join('');
    }

    // --- BUSCA CORRIGIDA (NOME, SETOR, MATRICULA) ---
    function filtrar() {
        const pVal = normalizar(document.getElementById('search-placa').value);
        const gVal = normalizar(document.getElementById('search-geral').value);
        const areaBusca = document.getElementById('search-results-area');
        const corpoBusca = document.getElementById('corpoBusca');

        if (!pVal && !gVal) { 
            areaBusca.classList.remove('active'); 
            return; 
        }

        const agrupado = {};

        dadosVeiculos.forEach((v, i) => {
            const matchPlaca = !pVal || normalizar(v.placa).includes(pVal);
            const matchGeral = !gVal || 
                               normalizar(v.nome).includes(gVal) || 
                               normalizar(v.setor).includes(gVal) || 
                               normalizar(v.matricula).includes(gVal);

            if (matchPlaca && matchGeral) {
                const matKey = v.matricula || "SEM-MAT-" + i;
                if (!agrupado[matKey]) {
                    agrupado[matKey] = { ...v, veiculos: [] };
                }
                agrupado[matKey].veiculos.push({ ...v, originalIndex: i });
            }
        });

        const resultados = Object.values(agrupado);

        areaBusca.classList.add('active');
        if (resultados.length > 0) {
            corpoBusca.innerHTML = resultados.map(p => gerarCardAgrupado(p)).join('<hr style="border:0; border-top:1px solid #decba4; margin:15px 0;">');
        } else {
            corpoBusca.innerHTML = '<p style="text-align:center; color:gray; font-size:12px;">Nenhum registro encontrado.</p>';
        }
    }

    function gerarCardAgrupado(p) {
        const htmlVeiculos = p.veiculos.map(v => `
            <div class="veiculo-tag">
                <div>
                    <span style="font-size:11px; font-weight:700;">${v.marca} ${v.modelo} (${v.cor})</span><br>
                    <div class="placa-badge" style="transform: scale(0.8); transform-origin: left; margin-top:4px;">${v.placa}</div>
                </div>
                <div style="display:flex; gap:5px;">
                    <button style="border:none; background:none; color:var(--fc-blue); font-weight:bold; font-size:10px; cursor:pointer;" onclick="verificarAcesso('edit', ${v.originalIndex})">EDITAR</button>
                    <button style="border:none; background:none; color:var(--fc-red); font-weight:bold; font-size:10px; cursor:pointer;" onclick="verificarAcesso('delete', ${v.originalIndex})">EXCLUIR</button>
                </div>
            </div>
        `).join('');

        return `
            <div>
                <h3 style="margin:0; color:var(--fc-blue); font-size:16px;">${p.nome}</h3>
                <div class="info-grid" style="margin: 8px 0; border:none; padding:0;">
                    <div class="info-item"><strong>MATRÍCULA</strong>${p.matricula}</div>
                    <div class="info-item"><strong>SETOR</strong>${p.setor}</div>
                    <div class="info-item"><strong>CARGO</strong>${p.cargo}</div>
                    <div class="info-item"><strong>CONTATO</strong>${p.contato}</div>
                    <div class="info-item"><strong>RAMAL</strong>${p.ramal}</div>
                </div>
                <div style="margin-top:10px; padding-top:10px; border-top: 1px dashed #eee;">
                    ${htmlVeiculos}
                </div>
            </div>`;
    }

    // --- REVISÃO E SALVAMENTO ---
    function revisarDados() {
        const pAtual = document.getElementById('v-placa').value.trim();
        if(pAtual && !veiculosTemp.some(v => v.placa === pAtual.toUpperCase())) {
            adicionarOutroVeiculo();
        }

        if(veiculosTemp.length === 0) return alert("Adicione pelo menos um veículo!");

        let incompleto = false;
        ['v-matricula', 'v-setor', 'v-nome', 'v-cargo', 'v-contato', 'v-ramal'].forEach(id => {
            const el = document.getElementById(id);
            if (el.value.trim().length < 2) { el.classList.add('input-required'); incompleto = true; }
        });

        if (incompleto) return alert("Preencha todos os campos corretamente!");

        const dadosPessoa = {
            matricula: document.getElementById('v-matricula').value.trim().toUpperCase(),
            setor: document.getElementById('v-setor').value.trim().toUpperCase(),
            nome: document.getElementById('v-nome').value.trim(),
            cargo: document.getElementById('v-cargo').value.trim().toUpperCase(),
            contato: document.getElementById('v-contato').value.trim().toUpperCase(),
            ramal: document.getElementById('v-ramal').value.trim().toUpperCase()
        };

        window.finalBatch = veiculosTemp.map(v => ({...v, ...dadosPessoa}));

        document.getElementById('revisao-lista').innerHTML = `
            <div class="info-item" style="grid-column: span 2"><strong>NOME</strong>${dadosPessoa.nome.toUpperCase()}</div>
            <div class="info-item"><strong>MATRÍCULA</strong>${dadosPessoa.matricula}</div>
            <div class="info-item"><strong>SETOR</strong>${dadosPessoa.setor}</div>
            <div class="info-item"><strong>CARGO</strong>${dadosPessoa.cargo}</div>
            <div class="info-item"><strong>CONTATO</strong>${dadosPessoa.contato}</div>
            <div class="info-item"><strong>RAMAL</strong>${dadosPessoa.ramal}</div>
            <div class="info-item" style="grid-column: span 2; border-top: 1px solid #ddd; margin-top:10px; padding-top:10px"><strong>VEÍCULOS:</strong></div>
            ${veiculosTemp.map(v => `<div class="info-item" style="background:#fff; padding:5px; border-radius:4px; border:1px solid #eee"><strong>${v.placa}</strong> - ${v.modelo}</div>`).join('')}
        `;
        
        document.getElementById('form-content').style.display = 'none';
        document.getElementById('view-revisao').classList.add('active');
    }

    function salvarFinal() {
        const idxEdicao = parseInt(document.getElementById('edit-index').value);
        if (idxEdicao !== -1) dadosVeiculos.splice(idxEdicao, 1);
        
        window.finalBatch.forEach(item => {
            if(!dadosVeiculos.some(db => db.placa === item.placa)) {
                dadosVeiculos.push(item);
            }
        });

        localStorage.setItem('veiculosFC', JSON.stringify(dadosVeiculos));
        alert("Salvo com sucesso!");
        location.reload();
    }

    function voltarEdicao() {
        document.getElementById('form-content').style.display = 'block';
        document.getElementById('view-revisao').classList.remove('active');
    }

    function switchView(view, skipToggle) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        if(!skipToggle) toggleMenu();
    }

    function prepareAdd() {
        veiculosTemp = [];
        document.getElementById('lista-temporaria').innerHTML = "";
        document.getElementById('edit-index').value = "-1";
        document.getElementById('form-title').innerText = "Novo Cadastro";
        
        camposIds.forEach(id => {
            const el = document.getElementById(id);
            el.value = "";
            el.classList.remove('input-valid');
            el.classList.add('input-required');
        });

        voltarEdicao(); 
        switchView('cadastro');
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function verificarAcesso(acao, index) {
        if (prompt("🔒 Senha ADM:") === SENHA_ADM) {
            if (acao === 'edit') {
                const v = dadosVeiculos[index];
                veiculosTemp = [{placa: v.placa, marca: v.marca, modelo: v.modelo, cor: v.cor}];
                document.getElementById('edit-index').value = index;
                document.getElementById('form-title').innerText = "Editar Veículo";
                camposIds.forEach(id => {
                    const el = document.getElementById(id);
                    const chave = id.replace('v-', '');
                    el.value = v[chave] || "";
                    validarInput(el);
                });
                atualizarListaTemp();
                switchView('cadastro', true);
            } else if(confirm("Deseja realmente excluir este registro?")) {
                dadosVeiculos.splice(index, 1);
                localStorage.setItem('veiculosFC', JSON.stringify(dadosVeiculos));
                filtrar();
            }
        } else {
            alert("❌ Senha incorreta!");
        }
    }

    window.onload = initBordas;
</script>
</body>
</html>
